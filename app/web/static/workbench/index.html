<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbench - AI Music Studio</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/studio.css" />
    <link rel="stylesheet" href="/assets/css/workbench.css" />
  </head>
  <body data-studio-tab="workbench">
    <main class="shell studio-shell">
      <nav id="studio-nav" class="studio-nav"></nav>

      <section class="studio-hero">
        <p class="eyebrow">Workbench</p>
        <h1>Teach your model</h1>
        <p class="muted">Pick the tracks that represent your sound. We package them for fine-tuning against your current model.</p>
      </section>

      <section class="card model-card">
        <div class="model-card-head">
          <h2>Your model</h2>
          <a class="button ghost small" href="/settings/">Settings</a>
        </div>
        <p id="model-status-text" class="model-status-text muted">Checking model…</p>
        <dl id="model-details" class="model-details"></dl>
      </section>

      <section class="card tracks-card">
        <div class="tracks-toolbar">
          <p id="tracks-summary" class="tracks-summary">Loading tracks…</p>
          <div class="actions">
            <button type="button" id="select-all-btn" class="ghost">Select all</button>
            <button type="button" id="download-btn">Download training package</button>
          </div>
        </div>

        <div id="tracks-list" class="tracks-list"></div>

        <p id="empty-hint" class="empty-hint muted" hidden>
          No tracks are ready yet. Import audio in <a href="/media/">Media</a>, add categories, and mark them reviewed — then come back here.
        </p>
      </section>
    </main>
    <script src="/assets/js/studio-routes.js"></script>
    <script src="/assets/js/studio-api.js"></script>
    <script src="/assets/js/studio-nav.js"></script>
    <script src="/assets/js/workbench-sessions.js"></script>
    <script src="/assets/js/workbench.js"></script>
  </body>
</html>
