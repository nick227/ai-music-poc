<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbench - AI Music Studio</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/studio.css" />
    <link rel="stylesheet" href="/workbench.css" />
  </head>
  <body>
    <main class="shell workbench-shell studio-shell">
      <nav id="studio-nav" class="studio-nav"></nav>

      <section class="studio-hero">
        <p class="eyebrow">Workbench</p>
        <h1>Pipeline &amp; versioning</h1>
        <p class="muted">Categorize reference audio, then use those tags to steer generation and compare outputs.</p>
      </section>

      <section id="pipeline-card" class="card pipeline-card" hidden>
        <h2>Active item</h2>
        <p id="pipeline-summary" class="muted">—</p>
        <div class="pipeline-steps">
          <span id="pipeline-cats" class="count-pill">0 categories</span>
          <a id="pipeline-generate" class="button" href="/">Generate baseline</a>
          <a id="pipeline-songs" class="button ghost" href="/songs.html">View songs</a>
          <a id="pipeline-media-link" class="button ghost" href="/media.html">Media library</a>
        </div>
      </section>

      <div class="workbench-layout" id="workbench-layout">
        <aside class="card queue-panel">
          <div class="section-head">
            <h2>Review queue</h2>
            <span id="queue-count" class="badge">0</span>
          </div>
          <div id="dropzone" class="dropzone">
            <input type="file" id="file-upload" multiple accept="audio/*" hidden />
            <button class="ghost small" type="button" onclick="document.getElementById('file-upload').click()">Add audio</button>
          </div>
          <div id="queue-list" class="queue-list"></div>
        </aside>

        <section id="editor-panel" class="card editor-panel editor-panel--idle">
          <form id="editor-form" class="editor-form" hidden>
            <header class="editor-header">
              <h2 id="active-filename"></h2>
              <div class="actions">
                <button type="button" id="skip-btn" class="ghost">Skip</button>
                <button type="button" id="done-btn" class="ghost">Done</button>
                <button type="submit" id="save-next-btn">Save + Next</button>
              </div>
            </header>

            <audio id="media-player" controls></audio>

            <section class="taxonomy-block">
              <div id="cat-chips" class="chips-container selected-chips"></div>
              <div id="cat-suggestions" class="chips-container suggestion-chips"></div>
              <div class="search-wrap">
                <input type="text" id="cat-search" placeholder="Search categories..." autocomplete="off" />
                <div id="cat-results" class="search-results hidden"></div>
              </div>
              <div id="cat-browse" class="browse-panel"></div>
            </section>

            <details class="optional-details">
              <summary>Scores &amp; role</summary>
              <div class="row">
                <label>
                  Quality
                  <input type="number" id="quality-score" min="1" max="5" />
                </label>
                <label>
                  Fit
                  <input type="number" id="fit-score" min="1" max="5" />
                </label>
                <label>
                  Role
                  <select id="role-select">
                    <option value="REFERENCE" selected>Reference</option>
                    <option value="GOLD_REFERENCE">Gold Reference</option>
                    <option value="TRAINING_CANDIDATE">Training Candidate</option>
                    <option value="NEGATIVE_EXAMPLE">Negative Example</option>
                    <option value="REJECT">Reject</option>
                  </select>
                </label>
              </div>
            </details>

            <label>
              Notes
              <textarea id="notes-input" rows="2"></textarea>
            </label>
          </form>
        </section>
      </div>
    </main>
    <script src="/studio-api.js"></script>
    <script src="/studio-nav.js"></script>
    <script src="/workbench-taxonomy.js"></script>
    <script src="/workbench.js"></script>
  </body>
</html>
