<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media item - AI Music Studio</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/studio.css" />
    <link rel="stylesheet" href="/assets/css/taxonomy.css" />
    <link rel="stylesheet" href="/assets/css/media.css" />
  </head>
  <body data-studio-tab="media">
    <main class="shell studio-shell media-detail-shell">
      <nav id="studio-nav" class="studio-nav"></nav>

      <section class="studio-hero">
        <p class="eyebrow">Media</p>
        <h1 id="page-title">—</h1>
      </section>

      <section class="card media-player-card">
        <audio id="media-player" controls></audio>
        <dl class="detail-meta detail-meta-inline" id="meta-list"></dl>
      </section>

      <section class="card tagging-card">

        <form id="editor-form" class="tagging-form">
          <div class="taxonomy-section search-section">
            <label class="section-label" for="cat-search">Search categories</label>
            <div class="search-wrap">
              <input type="text" id="cat-search" placeholder="Search by name or type…" autocomplete="off" />
              <div id="cat-results" class="search-results hidden"></div>
            </div>
          </div>

          <div class="taxonomy-section">
            <p class="section-label">Selected categories</p>
            <div id="cat-chips" class="chips-container selected-chips"></div>
            <p id="cat-chips-empty" class="section-empty muted hidden">No categories selected.</p>
          </div>

          <div class="taxonomy-section">
            <p class="section-label">Recently used</p>
            <div id="cat-recent" class="chips-container recent-chips"></div>
          </div>

          <div class="taxonomy-section browse-section">
            <p class="section-label">Browse by type</p>
            <div id="cat-browse" class="browse-panel"></div>
          </div>

          <label class="notes-label">Notes
            <textarea id="notes-input" rows="2" placeholder="Optional notes"></textarea>
          </label>

          <div class="form-actions">
            <button type="submit" id="save-categories-btn">Save categories</button>
            <p id="save-feedback" class="save-feedback" hidden aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>
    <script src="/assets/js/studio-routes.js"></script>
    <script src="/assets/js/studio-api.js"></script>
    <script src="/assets/js/studio-save.js"></script>
    <script src="/assets/js/studio-nav.js"></script>
    <script src="/assets/js/taxonomy.js"></script>
    <script src="/assets/js/media-detail.js"></script>
  </body>
</html>
