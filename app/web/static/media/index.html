<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media - AI Music Studio</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/studio.css" />
    <link rel="stylesheet" href="/assets/css/media.css" />
  </head>
  <body data-studio-tab="media">
    <main class="shell studio-shell">
      <nav id="studio-nav" class="studio-nav"></nav>

      <section class="studio-hero">
        <p class="eyebrow">Media</p>
        <h1>Upload and categorize</h1>
      </section>

      <div class="toolbar card">
        <input type="file" id="import-files" multiple accept="audio/*" hidden />
        <button type="button" id="import-btn">Import</button>
        <input type="search" id="search" placeholder="Search title..." />
        <select id="filter-review">
          <option value="">All review</option>
          <option value="NEEDS_REVIEW">Needs review</option>
          <option value="REVIEWED">Reviewed</option>
        </select>
        <select id="filter-kind">
          <option value="">All kinds</option>
          <option value="UPLOAD">Upload</option>
          <option value="GENERATED_SONG">Generated</option>
        </select>
        <span id="table-count" class="muted"></span>
      </div>

      <div id="bulk-action-bar" class="card" hidden style="background: var(--surface-2); border-color: var(--primary); display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <strong id="bulk-count">0 items selected</strong>
        </div>
        <div style="display: flex; gap: 8px;">
          <button type="button" id="bulk-assign-btn" class="small">Assign Categories</button>
          <button type="button" id="bulk-clear-btn" class="ghost small">Clear Selection</button>
        </div>
      </div>

      <div id="dropzone" class="media-dropzone media-table">
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 40px; text-align: center;"><input type="checkbox" id="bulk-select-all" /></th>
                <th>Track</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="media-rows"></tbody>
          </table>
        </div>
      </div>
    </main>

    <dialog id="category-picker-modal" class="card" style="width: 380px; max-height: 80vh; padding: 0; margin: 0; position: fixed; bottom: 24px; right: 24px; left: auto; top: auto; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
      <div style="display: flex; flex-direction: column; max-height: 80vh; padding: 20px; box-sizing: border-box; gap: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 style="margin: 0; font-size: 16px;">Assign Categories</h2>
          <button type="button" id="close-category-picker" class="ghost small">Close</button>
        </div>
        
        <div id="category-selected-section" style="padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; min-height: 48px; max-height: 120px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; border: 1px solid rgba(255,255,255,0.05);">
        </div>

        <input type="search" id="category-search" placeholder="Search categories..." style="width: 100%; box-sizing: border-box;" />
        
        <div id="category-grid" style="overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 8px;">
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; margin-top: auto;">
          <span id="category-picker-status" class="muted" style="font-size: 13px;" hidden>Saving...</span>
          <button type="button" id="apply-categories-btn" style="flex: 1;">Apply</button>
        </div>
      </div>
    </dialog>

    <script src="/assets/js/studio-routes.js"></script>
    <script src="/assets/js/studio-api.js"></script>
    <script src="/assets/js/studio-nav.js"></script>
    <script src="/assets/js/studio-training-status.js"></script>
    <script src="/assets/js/media-list.js"></script>
  </body>
</html>
