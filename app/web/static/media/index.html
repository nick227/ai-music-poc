<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media - AI Music Studio</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/studio.css" />
    <link rel="stylesheet" href="/assets/css/media.css" />
  </head>
  <body data-studio-tab="media">
    <main class="shell studio-shell">
      <nav id="studio-nav" class="studio-nav"></nav>

      <section class="studio-hero">
        <p class="eyebrow">Media</p>
        <h1>Audio library</h1>
      </section>

      <div class="toolbar card">
        <input type="file" id="import-files" multiple accept="audio/*" hidden />
        <button type="button" id="import-btn">Import</button>
        <input type="search" id="search" placeholder="Search title..." />
        <select id="filter-review">
          <option value="">All review</option>
          <option value="NEEDS_REVIEW">Needs review</option>
          <option value="REVIEWED">Reviewed</option>
        </select>
        <select id="filter-kind">
          <option value="">All kinds</option>
          <option value="UPLOAD">Upload</option>
          <option value="GENERATED_SONG">Generated</option>
        </select>
        <span id="table-count" class="muted"></span>
      </div>

      <div id="dropzone" class="media-dropzone media-table">
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Track</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="media-rows"></tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="/assets/js/studio-routes.js"></script>
    <script src="/assets/js/studio-api.js"></script>
    <script src="/assets/js/studio-nav.js"></script>
    <script src="/assets/js/studio-training-status.js"></script>
    <script src="/assets/js/media-list.js"></script>
  </body>
</html>
