<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Music POC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Prompt + lyrics → WAV</p>
        <h1>AI Music POC</h1>
        <p class="subcopy">A working local generation flow with a procedural engine and a clean adapter seam for a real music model.</p>
      </section>

      <section class="panel">
        <label>
          Prompt
          <textarea id="prompt" rows="5">dark French disco, heartbroken but danceable, glossy analog synths, tight drums, soft male vocal, cinematic chorus</textarea>
        </label>

        <label>
          Lyrics
          <textarea id="lyrics" rows="10">Verse
I keep your shadow in the hallway
I keep your voice inside the rain

Chorus
Dance until the morning forgets our names
Hold me like the night is burning down</textarea>
        </label>

        <div class="row">
          <label>
            Duration
            <input id="duration" type="number" min="8" max="180" value="45" />
          </label>
          <label>
            Seed <span class="muted">optional</span>
            <input id="seed" type="number" min="0" placeholder="random from text" />
          </label>
        </div>

        <button id="generate">Generate song sketch</button>
      </section>

      <section id="result" class="panel result hidden">
        <div class="statusline">
          <strong>Status:</strong>
          <span id="status">queued</span>
        </div>
        <pre id="metadata"></pre>
        <audio id="audio" controls class="hidden"></audio>
        <a id="download" class="download hidden" href="#">Download WAV</a>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
